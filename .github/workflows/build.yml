name: Build Hybrid Theme

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build Theme
        run: uv run build.py

      - name: Zip Theme
        run: |
          cd dist
          zip -r ../theme.zip ./*

      - name: Upload Theme Artifact
        uses: actions/upload-artifact@v4
        with:
          name: headless-dawn-theme
          path: theme.zip
